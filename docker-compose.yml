services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ariana-voice-gateway
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env
    volumes:
      - ./tmp:/app/tmp
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:${process.env.PORT || 3001}/api/health`).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ariana-network

networks:
  ariana-network:
    driver: bridge
